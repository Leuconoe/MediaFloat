name: Android Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Grant Gradle wrapper execute permission
        run: chmod +x gradlew

      - name: Restore release keystore
        shell: bash
        run: |
          mkdir -p keystore
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > keystore/MediaFloat-release.jks
          cat > keystore.properties <<EOF
          storeFile=keystore/MediaFloat-release.jks
          storePassword=${ANDROID_STORE_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          keyPassword=${ANDROID_KEY_PASSWORD}
          EOF
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Run release checks
        run: ./gradlew :app:testDebugUnitTest :app:assembleRelease :app:bundleRelease -Pkotlin.incremental=false

      - name: Prepare release artifact
        run: |
          mkdir -p release-artifacts
          cp app/build/outputs/apk/release/app-release.apk release-artifacts/MediaFloat-android-${GITHUB_REF_NAME}-signed.apk
          cp app/build/outputs/bundle/release/app-release.aab release-artifacts/MediaFloat-android-${GITHUB_REF_NAME}-signed.aab

      - name: Publish GitHub release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/MediaFloat-android-${{ github.ref_name }}-signed.apk
            release-artifacts/MediaFloat-android-${{ github.ref_name }}-signed.aab
